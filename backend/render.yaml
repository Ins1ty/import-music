name: import-music-backend
runtime: php
region: oregon
plan: free
buildCommand: composer install --no-interaction --prefer-dist --optimize-autoloader
installCommand: composer install --no-interaction --prefer-dist --optimize-autoloader
startCommand: php artisan serve --port=$PORT
healthCheckPath: /api/health

envVars:
  - key: APP_ENV
    value: production
  - key: APP_DEBUG
    value: false
  - key: APP_KEY
    generateValue: true
  - key: CORS_ALLOWED_ORIGINS
    value: "*"
